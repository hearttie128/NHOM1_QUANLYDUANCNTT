<style>

table{width:100%}th{background:#0a1929;text-align:left;padding:10px 12px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#64748b}
td{padding:10px 12px;border-bottom:1px solid #0d1f3c;font-size:13px;color:#cbd5e1}
tr:hover td{background:rgba(37,99,235,.06)}
.badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 20px;border-radius:10px;color:#fff;font-size:13px;animation:slideIn .3s ease,fadeOut .3s ease 2.7s forwards;box-shadow:0 8px 25px rgba(0,0,0,.3)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateY(-10px)}}
.login-bg{background:radial-gradient(ellipse at 30% 40%,#0a2560 0%,#060d1a 60%),linear-gradient(135deg,#060d1a,#091428)}
.pulse-dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.logo-svg text{font-family:'Be Vietnam Pro',sans-serif}

function doLogin(){

    const a=document.createElement('a');a.href='#';
    a.className=`sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-400 ${currentPage===m.id?'active':''}`;
    a.innerHTML=`<i data-lucide="${m.icon}" class="w-4 h-4"></i>${m.label}`;
    a.onclick=e=>{e.preventDefault();navigateTo(m.id)};
    nav.appendChild(a);
  });
  lucide.createIcons();
}

function navigateTo(page){
  currentPage=page;buildSidebar();
  document.getElementById('pageTitle').textContent=MENU.find(m=>m.id===page)?.label||page;
  const c=document.getElementById('pageContent');
  const renderers={dashboard:renderDashboard,products:renderProducts,categories:renderCategories,
    customers:renderCustomers,orders:renderOrders,warehouse:renderWarehouse,
    revenue:renderRevenue,forecast:renderForecast,staff:renderStaff,accounts:renderAccounts,settings:renderSettings};
  (renderers[page]||renderDashboard)(c);lucide.createIcons();
}

// ===== CHART HELPERS =====
function drawBarChart(canvasId, labels, datasets, opts={}){
  requestAnimationFrame(()=>{
    const canvas=document.getElementById(canvasId);
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width, H=canvas.height;
    const pad={top:30,right:20,bottom:40,left:65};
    const chartW=W-pad.left-pad.right, chartH=H-pad.top-pad.bottom;
    ctx.clearRect(0,0,W,H);

    // find max
    const allVals=datasets.flatMap(d=>d.data);
    const maxV=Math.max(...allVals)*1.1||1;

    // grid lines
    const gridN=5;
    for(let i=0;i<=gridN;i++){
      const y=pad.top+chartH-(i/gridN)*chartH;
      ctx.beginPath();ctx.strokeStyle='rgba(30,64,128,0.5)';ctx.lineWidth=1;
      ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+chartW,y);ctx.stroke();
      const val=(maxV*i/gridN);
      ctx.fillStyle='#4b6a9b';ctx.font='10px Be Vietnam Pro';ctx.textAlign='right';
      ctx.fillText(val>=1e6?(val/1e6).toFixed(0)+'M':val.toFixed(0),pad.left-6,y+3);
    }

    // bars
    const barGroupW=chartW/labels.length;
    const totalBars=datasets.length;
    const barW=Math.min((barGroupW/(totalBars+1))*0.85,32);

    datasets.forEach((ds,di)=>{
      ds.data.forEach((v,i)=>{
        const bh=(v/maxV)*chartH;
        const x=pad.left+i*barGroupW+(barGroupW/(totalBars+1))*(di+0.5)+barW*(di-totalBars/2+0.5);
        const y=pad.top+chartH-bh;
        // gradient
        const grd=ctx.createLinearGradient(0,y,0,y+bh);
        const c1=ds.color||'#2563eb',c2=ds.colorEnd||'#1e3a8a';
        grd.addColorStop(0,c1);grd.addColorStop(1,c2);
        ctx.fillStyle=grd;
        // rounded top
        const r=Math.min(4,bh/2);
        ctx.beginPath();
        ctx.moveTo(x,y+r);ctx.lineTo(x,y+bh);ctx.lineTo(x+barW,y+bh);ctx.lineTo(x+barW,y+r);
        ctx.quadraticCurveTo(x+barW,y,x+barW-r,y);ctx.lineTo(x+r,y);
        ctx.quadraticCurveTo(x,y,x,y+r);ctx.fill();
        // value label on top
        if(bh>18){
          ctx.fillStyle='#93c5fd';ctx.font='9px Be Vietnam Pro';ctx.textAlign='center';
          const lbl=v>=1e6?(v/1e6).toFixed(0)+'M':v+'';
          ctx.fillText(lbl,x+barW/2,y-4);
        }
      });
    });

    // x labels
    labels.forEach((lbl,i)=>{
      const x=pad.left+i*barGroupW+barGroupW/2;
      ctx.fillStyle='#64748b';ctx.font='10px Be Vietnam Pro';ctx.textAlign='center';
      ctx.fillText(lbl,x,pad.top+chartH+16);
    });

    // legend
    if(opts.legend&&datasets.length>1){
      let lx=pad.left;
      datasets.forEach(ds=>{
        ctx.fillStyle=ds.color;ctx.fillRect(lx,pad.top+chartH+28,12,8);
        ctx.fillStyle='#94a3b8';ctx.font='10px Be Vietnam Pro';ctx.textAlign='left';
        ctx.fillText(ds.label,lx+15,pad.top+chartH+36);lx+=ds.label.length*7+25;
      });
    }
  });
}

function drawLineChart(canvasId, labels, datasets){
  requestAnimationFrame(()=>{
    const canvas=document.getElementById(canvasId);
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width, H=canvas.height;
    const pad={top:30,right:20,bottom:50,left:65};
    const chartW=W-pad.left-pad.right, chartH=H-pad.top-pad.bottom;
    ctx.clearRect(0,0,W,H);
    const allVals=datasets.flatMap(d=>d.data.filter(v=>v!==null));
    const maxV=Math.max(...allVals)*1.1||1;
    const minV=0;

    for(let i=0;i<=5;i++){
      const y=pad.top+chartH-(i/5)*chartH;
      ctx.beginPath();ctx.strokeStyle='rgba(30,64,128,0.4)';ctx.lineWidth=1;
      ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+chartW,y);ctx.stroke();
      const val=((maxV-minV)*i/5);
      ctx.fillStyle='#4b6a9b';ctx.font='10px Be Vietnam Pro';ctx.textAlign='right';
      ctx.fillText(val>=1e6?(val/1e6).toFixed(0)+'M':val.toFixed(0),pad.left-6,y+3);
    }

    datasets.forEach(ds=>{
      const pts=[];
      ds.data.forEach((v,i)=>{
        if(v===null)return;
        const x=pad.left+(i/(labels.length-1))*chartW;
        const y=pad.top+chartH-((v-minV)/(maxV-minV))*chartH;
        pts.push({x,y,i,v});
      });
      // fill area
      if(pts.length>1){
        ctx.beginPath();
        ctx.moveTo(pts[0].x,pad.top+chartH);
        pts.forEach(p=>ctx.lineTo(p.x,p.y));
        ctx.lineTo(pts[pts.length-1].x,pad.top+chartH);
        ctx.closePath();
        ctx.fillStyle=ds.fill||'rgba(37,99,235,0.1)';ctx.fill();
      }
      // line
      ctx.beginPath();ctx.strokeStyle=ds.color||'#3b82f6';ctx.lineWidth=2.5;ctx.lineJoin='round';
      if(ds.dashed)ctx.setLineDash([6,4]);else ctx.setLineDash([]);
      pts.forEach((p,j)=>{if(j===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y)});
      ctx.stroke();ctx.setLineDash([]);
      // dots
      pts.forEach(p=>{
        ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);
        ctx.fillStyle=ds.color||'#3b82f6';ctx.fill();
        ctx.strokeStyle='#060d1a';ctx.lineWidth=1.5;ctx.stroke();
      });
    });

    // x labels
    labels.forEach((lbl,i)=>{
      const x=pad.left+(i/(labels.length-1))*chartW;
      ctx.fillStyle=i>=12?'#34d399':'#64748b';
      ctx.font=`${i>=12?'bold ':''}10px Be Vietnam Pro`;ctx.textAlign='center';
      ctx.fillText(lbl,x,pad.top+chartH+16);
    });

    // legend
    const lgs=datasets;
    let lx=pad.left;
    lgs.forEach(ds=>{
      if(ds.dashed){ctx.setLineDash([5,3]);ctx.strokeStyle=ds.color;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(lx,pad.top+chartH+34);ctx.lineTo(lx+14,pad.top+chartH+34);ctx.stroke();ctx.setLineDash([])}
      else{ctx.fillStyle=ds.color;ctx.fillRect(lx,pad.top+chartH+28,14,6)}
      ctx.fillStyle='#94a3b8';ctx.font='10px Be Vietnam Pro';ctx.textAlign='left';
      ctx.fillText(ds.label,lx+18,pad.top+chartH+36);lx+=ds.label.length*7+30;
    });
  });
}

function renderOrderRows(){
  const st=document.getElementById('orderFilter')?.value||'';

  const stMap={done:{label:'Hoàn thành',cls:'bg-green-900/40 text-green-400'},pending:{label:'Chờ xử lý',cls:'bg-amber-900/40 text-amber-400'},cancel:{label:'Đã hủy',cls:'bg-red-900/30 text-red-400'}};
  document.getElementById('orderBody').innerHTML=f.map(o=>{
    const s=stMap[o.status];
    return`<tr>

<td class="text-xs">${o.order_date}</td>

function toggleStaff(id){const s=STAFF_DB.find(x=>x.id===id);if(s){s.active=!s.active;renderStaff(document.getElementById('pageContent'));showToast(s.active?'Đã mở khóa tài khoản':'Đã khóa tài khoản')}}
function deleteStaff(id){if(!confirm('Xóa nhân viên này?'))return;STAFF_DB=STAFF_DB.filter(s=>s.id!==id);renderStaff(document.getElementById('pageContent'));showToast('Đã xóa nhân viên')}
function showStaffModal(editId){
  const s=editId?STAFF_DB.find(x=>x.id===editId):null;
  showModal(s?'Sửa nhân viên':'Thêm nhân viên',`

<div><label class="block text-xs text-gray-400 mb-1">Chức vụ</label><select id="stRole" class="w-full text-xs"><option ${s?.role==='Admin'?'selected':''}>Admin</option><option ${s?.role==='Quản lý'?'selected':''}>Quản lý</option><option ${!s||s?.role==='Nhân viên'?'selected':''}>Nhân viên</option></select></div>
<div><label class="block text-xs text-gray-400 mb-1">Chi nhánh</label><select id="stBranch" class="w-full text-xs"><option ${s?.branch==='HCM'?'selected':''}>HCM</option><option ${s?.branch==='HN'?'selected':''}>HN</option></select></div>
</div>`,()=>{
    const d={name:document.getElementById('stName').value,email:document.getElementById('stEmail').value,role:document.getElementById('stRole').value,branch:document.getElementById('stBranch').value};
    if(!d.name){showToast('Nhập họ tên','error');return}
    if(editId){const i=STAFF_DB.findIndex(x=>x.id===editId);STAFF_DB[i]={...STAFF_DB[i],...d}}

    closeModal();renderStaff(document.getElementById('pageContent'));showToast(editId?'Đã cập nhật':'Đã thêm nhân viên');

${[{u:'admin',t:'2025-01-18 08:30',ip:'192.168.1.1',action:'Đăng nhập thành công'},{u:'nv',t:'2025-01-18 09:15',ip:'192.168.1.5',action:'Đăng nhập thành công'},{u:'ql',t:'2025-01-17 14:20',ip:'192.168.1.3',action:'Đăng nhập thành công'},{u:'admin',t:'2025-01-17 08:00',ip:'192.168.1.1',action:'Đổi mật khẩu'}].map(l=>`
<div class="flex justify-between items-center py-2 border-b border-blue-900/30 last:border-0">
  <div class="flex items-center gap-2"><span class="badge bg-blue-900/40 text-blue-300">${l.u}</span><span class="text-xs text-gray-400">${l.t}</span><span class="text-xs text-gray-600">${l.action}</span></div>
  <span class="text-[10px] text-gray-600">${l.ip}</span>
</div>`).join('')}
</div></div>`;
  renderAccountRows();lucide.createIcons();
}
function renderAccountRows(){
  const roleMap={admin:{label:'Admin',cls:'bg-blue-900/40 text-blue-300'},manager:{label:'Quản lý',cls:'bg-purple-900/40 text-purple-300'},staff:{label:'Nhân viên',cls:'bg-gray-700/40 text-gray-400'}};
  document.getElementById('accBody').innerHTML=Object.entries(USERS_DB).map(([u,d])=>{
    const staff=STAFF_DB.find(s=>s.user_id===d.id);
    const r=roleMap[d.role]||roleMap.staff;
    return`<tr>
<td class="font-mono text-xs font-semibold text-blue-300">${u}</td>
<td class="text-xs text-white">${staff?.name||d.username}</td>
<td><span class="badge ${r.cls}">${r.label}</span></td>
<td class="text-xs">${staff?.branch||'—'}</td>
<td><span class="badge bg-green-900/40 text-green-400">Active</span></td>
<td><div class="flex gap-1">
  <button class="text-[10px] px-2 py-1 bg-blue-900/30 text-blue-400 rounded-lg" onclick="showAccountModal('${u}')"><i data-lucide="edit" class="w-3 h-3 inline mr-0.5"></i>Sửa</button>
  <button class="text-[10px] px-2 py-1 bg-amber-900/20 text-amber-400 rounded-lg" onclick="resetPassword('${u}')">Reset MK</button>
  ${u!=='admin'?`<button class="text-[10px] px-2 py-1 bg-red-900/20 text-red-400 rounded-lg" onclick="deleteAccount('${u}')">Xóa</button>`:''}
</div></td></tr>`}).join('');
  lucide.createIcons();
}
function showAccountModal(editUsername){
  const u=editUsername?USERS_DB[editUsername]:null;
  const linkedStaff=u?STAFF_DB.find(s=>s.user_id===u.id):null;
  showModal(u?'Sửa tài khoản':'Tạo tài khoản mới',`
<div class="grid grid-cols-2 gap-3">
<div><label class="block text-xs text-gray-400 mb-1">Username</label><input id="auUser" value="${editUsername||''}" class="w-full text-xs" ${editUsername?'disabled':''}></div>
<div><label class="block text-xs text-gray-400 mb-1">Vai trò</label><select id="auRole" class="w-full text-xs">
  <option value="admin" ${u?.role==='admin'?'selected':''}>Admin</option>
  <option value="manager" ${u?.role==='manager'?'selected':''}>Quản lý</option>
  <option value="staff" ${!u||u?.role==='staff'?'selected':''}>Nhân viên</option>
</select></div>
${!editUsername?`<div class="col-span-2"><label class="block text-xs text-gray-400 mb-1">Mật khẩu</label><input id="auPass" type="password" placeholder="Mật khẩu mới" class="w-full text-xs"></div>`:''}
<div class="col-span-2"><label class="block text-xs text-gray-400 mb-1">Liên kết nhân viên</label><select id="auStaff" class="w-full text-xs">
  <option value="">— Chưa liên kết —</option>
  ${STAFF_DB.map(s=>`<option value="${s.id}" ${linkedStaff?.id===s.id?'selected':''}>${s.name} (${s.branch})</option>`).join('')}
</select></div>
</div>`,()=>{
    const username=editUsername||document.getElementById('auUser').value.trim();
    const role=document.getElementById('auRole').value;
    const staffId=document.getElementById('auStaff').value;
    const roleNames={admin:'Quản trị viên',manager:'Quản lý',staff:'Nhân viên'};
    if(!username){showToast('Nhập username','error');return}
    if(editUsername){
      USERS_DB[editUsername].role=role;USERS_DB[editUsername].roleName=roleNames[role];
    } else {
      const pass=document.getElementById('auPass').value||'123456';
      USERS_DB[username]={id:nextId('users'),username,password:pass,role,roleName:roleNames[role]};
    }
    // link staff
    if(staffId){
      STAFF_DB.forEach(s=>{if(s.user_id===USERS_DB[username].id)s.user_id=null});
      const s=STAFF_DB.find(x=>x.id===+staffId);if(s)s.user_id=USERS_DB[username].id;
    }
    closeModal();renderAccountRows();showToast(editUsername?'Đã cập nhật tài khoản':'Đã tạo tài khoản mới');
  });
}
function resetPassword(username){
  showModal('Đặt lại mật khẩu',`
<div><label class="block text-xs text-gray-400 mb-1">Mật khẩu mới cho <strong>${username}</strong></label><input id="rpPass" type="password" placeholder="Nhập mật khẩu mới" class="w-full text-xs"></div>
<div class="mt-2"><input id="rpPass2" type="password" placeholder="Xác nhận mật khẩu" class="w-full text-xs"></div>`,()=>{
    const p1=document.getElementById('rpPass').value, p2=document.getElementById('rpPass2').value;
    if(!p1){showToast('Nhập mật khẩu','error');return}
    if(p1!==p2){showToast('Mật khẩu không khớp','error');return}
    USERS_DB[username].password=p1;closeModal();showToast('Đã đặt lại mật khẩu thành công');
  });
}
function deleteAccount(username){
  if(!confirm(`Xóa tài khoản "${username}"?`))return;
  delete USERS_DB[username];renderAccountRows();showToast('Đã xóa tài khoản');
}

// ===== MODAL =====
function showModal(title,body,onSave){
  let m=document.getElementById('globalModal');
  if(!m){m=document.createElement('div');m.id='globalModal';document.body.appendChild(m)}
  m.innerHTML=`<div class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4">
<div class="rounded-2xl border border-blue-900/40 w-full max-w-lg shadow-2xl fade-in" style="background:#0d1f3c">
<div class="flex justify-between items-center p-4 border-b border-blue-900/30">
  <h3 class="text-sm font-semibold text-white">${title}</h3>
  <button onclick="closeModal()" class="p-1 hover:bg-blue-900/30 rounded-lg"><i data-lucide="x" class="w-4 h-4"></i></button>
</div>
<div class="p-4">${body}</div>
<div class="flex justify-end gap-2 p-4 border-t border-blue-900/30">
  <button onclick="closeModal()" class="px-4 py-2 rounded-lg text-xs text-gray-400 hover:bg-blue-900/20 transition">Hủy</button>
  <button id="modalSaveBtn" class="btn-primary px-4 py-2 rounded-lg text-xs text-white font-semibold">Lưu</button>
</div></div></div>`;
  document.getElementById('modalSaveBtn').onclick=onSave;
  m.style.display='block';lucide.createIcons();
}
function closeModal(){const m=document.getElementById('globalModal');if(m)m.style.display='none'}
